services:
  - type: web
    name: studyquest-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn studyquest_api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: studyquest
      - key: STUDYQUEST_ADMIN_KEY
        generateValue: true
      - key: STUDYQUEST_JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://shrisundaram2120.github.io
