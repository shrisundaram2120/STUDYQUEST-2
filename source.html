<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyQuest | Sources</title>
    <link rel="icon" href="studyquest-high-resolution-logo-black-transparent.png" type="image/png">
    <link rel="stylesheet" href="studyquest.css">
    <style>
        body { --page-image: url('pngtree-great-outdoors-digital-painting-4k-landscape-of-nature-with-trees-mountains-image_15699422.jpg'); }
    </style>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <img src="studyquest-high-resolution-logo-black-transparent.png" alt="StudyQuest logo">
                <div class="brand-copy"><h1>StudyQuest</h1><p>Sources</p></div>
            </div>
            <nav class="nav-links">
                <a href="home.html">Home</a>
                <a href="tasks.html">Tasks</a>
                <a href="notes.html">Notes</a>
                <a href="ttgen.html">Timetable Gen</a>
                <a class="active" href="source.html">Sources</a>
                <a href="aiquest.html">AI Quest</a>
                <a href="ocr.html">Img-Text</a>
                <a href="summarizer.html">Summarizer</a>
                <a href="chat.html">Chat</a>
            </nav>
        </aside>
        <main class="main">
            <div class="topbar">
                <div class="page-title">
                    <button class="sidebar-toggle" id="sidebarToggle" type="button">Menu</button>
                    <h2>Study sources</h2>
                    <p>Pick a language and open curated video or text resources.</p>
                </div>
            </div>
            <section class="card" style="margin-bottom: 22px;">
                <div class="card-header">
                    <div>
                        <p class="eyebrow">Filter</p>
                        <h3 style="margin-bottom: 8px;">Choose your learning language</h3>
                    </div>
                </div>
                <div class="inline-form">
                    <select class="select" id="languageSelect"></select>
                </div>
            </section>
            <section class="resource-grid">
                <article class="resource-card">
                    <p class="eyebrow">Video</p>
                    <h3 style="margin-bottom: 8px;">Recommended channels</h3>
                    <div class="resource-list" id="videoList"></div>
                </article>
                <article class="resource-card">
                    <p class="eyebrow">Text</p>
                    <h3 style="margin-bottom: 8px;">Reading resources</h3>
                    <div class="resource-list" id="textList"></div>
                </article>
            </section>
        </main>
    </div>
    <script src="studyquest.js"></script>
    <script>
        StudyQuest.attachSidebarToggle('sidebarToggle', 'sidebar');

        const resources = {
            English: {
                video: [
                    ['Class 12 by Unacademy', 'https://www.youtube.com/@class12byunacademy'],
                    ['Physics Wallah English', 'https://www.youtube.com/@EnglishPW'],
                    ['Humanities Adda247', 'https://www.youtube.com/@humanitiesadda247'],
                    ['Vedantu Class 9 and 10', 'https://www.youtube.com/@VedantuClass910']
                ],
                text: [
                    ['Quizlet', 'https://quizlet.com/'],
                    ['BYJU\'S CBSE Books', 'https://byjus.com/cbse/cbse-books/'],
                    ['Vedantu Study Material', 'https://www.vedantu.com/study-material'],
                    ['NCERT Textbooks', 'https://ncert.nic.in/textbook.php']
                ]
            },
            Tamil: {
                video: [
                    ['Learn with Rohini', 'https://www.youtube.com/@learnwithrohini'],
                    ['MurugaMP', 'https://www.youtube.com/@MurugaMP'],
                    ['Vedantu Master Tamil', 'https://www.youtube.com/@Master_tamil']
                ],
                text: [
                    ['Nammakalvi', 'https://nammakalvi.com'],
                    ['Kalvikadal', 'https://www.kalvikadal.in'],
                    ['CBSE Tamil', 'https://cbsetamil.com/']
                ]
            },
            Malayalam: {
                video: [
                    ['Pachamarathanal', 'https://www.youtube.com/@Pachamarathanal'],
                    ['Math Crusader', 'https://www.youtube.com/@mathcrusader'],
                    ['Vedantu Malayalam', 'https://www.youtube.com/@VedantuMalayalam']
                ],
                text: [
                    ['OSSAE Bodhanam', 'https://ossaebodhanam.org/malayalam-study-materials'],
                    ['NIOS Malayalam', 'https://www.nios.ac.in/online-course-material/secondary-courses/malayalam-medium.aspx'],
                    ['Samagra', 'https://samagra.kite.kerala.gov.in/']
                ]
            },
            Telugu: {
                video: [
                    ['PW Telugu', 'https://www.youtube.com/@PWTelugu'],
                    ['Vedantu Telugu', 'https://www.youtube.com/@vedantutelugu'],
                    ['Studious Official', 'https://www.youtube.com/@StudiousOfficial']
                ],
                text: [
                    ['Sakshi Education', 'https://education.sakshi.com/en/ap-10th/study-material/telugu'],
                    ['Vyoma Online', 'https://vyomaonline.com/studymaterial/'],
                    ['eStudy Material', 'https://www.estudymaterial.com/']
                ]
            },
            Kannada: {
                video: [
                    ['PW Kannada', 'https://www.youtube.com/@PWKannada'],
                    ['Kannada Lessons and Poems', 'https://www.youtube.com/@Kannadalessonsandpoems'],
                    ['Simplified Minds', 'https://www.youtube.com/@simplifiedminds']
                ],
                text: [
                    ['KSEEB Solutions', 'https://www.kseebsolutions.com/2nd-puc-kannada-textbook-answers/'],
                    ['Karnataka Textbook Society', 'https://ktbs.kar.nic.in/New/index.html#!/textbook'],
                    ['BYJU\'S Karnataka Books', 'https://byjus.com/kseeb/karnataka-state-board-books/']
                ]
            },
            Hindi: {
                video: [
                    ['PW Hindi Medium', 'https://www.youtube.com/@PW-HindiMedium'],
                    ['NEET Wallah Hindi', 'https://www.youtube.com/@NEETWallahHindi'],
                    ['Dear Sir', 'https://www.youtube.com/@DearSir']
                ],
                text: [
                    ['Vedantu NCERT Notes', 'https://www.vedantu.com/cbse/ncert-notes'],
                    ['GK Hindi Gyan', 'https://gk-hindigyan.com/ncert-notes-in-hindi/'],
                    ['NCERT Hindi Books', 'https://ncert.nic.in/textbook.php']
                ]
            }
        };

        const languageSelect = document.getElementById('languageSelect');
        const videoList = document.getElementById('videoList');
        const textList = document.getElementById('textList');

        languageSelect.innerHTML = Object.keys(resources).map((language) => `<option value="${language}">${language}</option>`).join('');

        function renderResources(language) {
            const selected = resources[language];
            videoList.innerHTML = selected.video.map(([title, url]) => `<a class="resource-link" href="${url}" target="_blank" rel="noopener noreferrer">${title}</a>`).join('');
            textList.innerHTML = selected.text.map(([title, url]) => `<a class="resource-link" href="${url}" target="_blank" rel="noopener noreferrer">${title}</a>`).join('');
        }

        languageSelect.addEventListener('change', () => renderResources(languageSelect.value));
        renderResources(languageSelect.value || 'English');
    </script>
</body>
</html>
